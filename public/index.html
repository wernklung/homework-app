<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework App — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">📚</div>
    <h1>Homework App</h1>
    <p>Sign in to continue</p>

    <div id="error" class="alert alert-error" style="display:none"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" id="loginBtn">
        Sign In
      </button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  const user = API.getUser();
  if (user) location.href = user.role === 'tutor' ? '/tutor' : '/student';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const { token, user } = await API.login(
        document.getElementById('username').value.trim(),
        document.getElementById('password').value
      );
      API.setAuth(token, user);
      location.href = user.role === 'tutor' ? '/tutor' : '/student';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
